<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Установка Альфа Онлайн</title>
    <style>
        /* --- ЦВЕТОВАЯ СХЕМА АЛЬФА БАНКА --- */
        :root {
            /* Глубокий темно-бордовый / вишневый фон, как на photo 2 */
            --bg-color: #1a0a0d; 
            /* Полупрозрачный стеклянный фон карты, адаптированный под фон */
            --card-bg: rgba(26, 10, 13, 0.7);
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            
            /* Фирменные красные цвета Альфа Банка */
            --alfa-red: #EF3124;
            --alfa-dark-red: #b0241b;
            
            /* Красный для кнопки и свечения */
            --button-bg: #EF3124;
            --button-border: rgba(255, 255, 255, 0.15);
            --glow-color: rgba(239, 49, 36, 0.5); /* Красное свечение */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Системные шрифты Apple (San Francisco) для максимальной схожести */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* --- ДИНАМИЧЕСКИЙ ФОН: Глубокое красное свечение --- */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background: 
                radial-gradient(circle at 50% 35%, rgba(239, 49, 36, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(239, 49, 36, 0.12) 0%, transparent 40%);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        /* --- ЗАГОЛОВКИ: В точности как на референсе ВТБ --- */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            text-align: center;
        }

        .main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        /* --- ПРЕМИАЛЬНАЯ СТЕКЛЯННАЯ КАРТОЧКА: Точно по дизайну ВТБ --- */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 32px;
        }

        .card-info {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* --- КНОПКА С ФИЗИЧЕСКИМ ПРОЖАТИЕМ И КРАСНЫМ СВЕЧЕНИЕМ --- */
        .interactive-btn {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--alfa-red) 0%, var(--alfa-dark-red) 100%);
            border: 1px solid var(--button-border);
            border-radius: 22px;
            padding: 18px 24px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Эффект при максимальном нажатии с красным свечением */
        .interactive-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px var(--glow-color), inset 0 0 10px rgba(239, 49, 36, 0.2);
            background-color: rgba(176, 36, 27, 0.95);
            border-color: rgba(239, 49, 36, 0.5);
        }

        .btn-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Стилизованный контейнер под иконку приложения */
        .btn-icon-sq {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: transparent;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ПОДВАЛ БЕЗОПАСНОСТИ: В точности как у ВТБ --- */
        .footer-status {
            display: flex;
            align-items: center;
            background: rgba(239, 49, 36, 0.0
