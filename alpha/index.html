<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Установка Альфа Онлайн</title>
    <style>
        :root {
            --bg-color: #0f0506; /* Глубокий темный фон с легким оттенком бордового */
            --card-bg: rgba(26, 13, 15, 0.7); /* Точно такая же прозрачность и структура стеклянной карты */
            --text-main: #ffffff;
            --text-secondary: #9299a6;
            --alfa-red: #EF3124; /* Фирменный красный Альфа Банка */
            --alfa-dark-red: #b0241b;
            --button-bg: #140b0c;
            --button-border: rgba(239, 49, 36, 0.15);
            --glow-color: rgba(239, 49, 36, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Динамический фон в точности как у ВТБ, но переведенный в красный спектр */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background: 
                radial-gradient(circle at 50% 35%, rgba(239, 49, 36, 0.22) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(239, 49, 36, 0.10) 0%, transparent 40%);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2; /* Сохранено свойство, которое идеально отработало на ВТБ */
        }

        /* Логотип над картой */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            text-align: center;
        }

        .main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff 40%, #ffcccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        /* Премиальная стеклянная карточка */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 32px;
        }

        .card-info {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* --- КНОПКА С ФИЗИЧЕСКИМ ПРОЖАТИЕМ --- */
        .interactive-btn {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--button-bg) 0%, rgba(31, 14, 16, 0.9) 100%);
            border: 1px solid var(--button-border);
            border-radius: 22px;
            padding: 18px 24px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Эффект при клике со вспышкой красного свечения */
        .interactive-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px var(--glow-color), inset 0 0 10px rgba(239, 49, 36, 0.2);
            background-color: rgba(43, 20, 23, 0.95);
            border-color: rgba(239, 49, 36, 0.5);
        }

        .btn-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Контейнер под иконку приложения */
        .btn-icon-sq {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--alfa-dark-red) 0%, var(--alfa-red) 100%);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(239, 49, 36, 0.3);
            flex-shrink: 0;
        }

        /* Текстовый логотип (Буква А и линия) */
        .alfa-logo-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 0.85;
            margin-top: -2px; /* Легкая центровка текста по вертикали */
        }

        .logo-letter {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        .logo-line {
            width: 16px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 1px;
            margin-top: 1px;
        }

        /* Подвал */
        .footer-status {
            display: flex;
            align-items: center;
            background: rgba(239, 49, 36, 0.05);
            border: 1px solid rgba(239, 49, 36, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #ffcccc;
            letter-spacing: 0.2px;
        }

        .red-dot {
            width: 8px;
            height: 8px;
            background: var(--alfa-red);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--alfa-red);
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="brand-header">
        <h1 class="main-title">Альфа Онлайн</h1>
        <p class="subtitle">Безопасная установка официального приложения</p>
    </div>

    <div class="card">
        <p class="card-info">
            Нажмите на кнопку ниже, чтобы запустить автоматический процесс установки приложения на ваш iPhone.
        </p>

        <a href="itms-services://?action=download-manifest&url=https://appleclubq.github.io/appsinstallonair/alpha/alfa_manifest.plist" class="interactive-btn">
            <div class="btn-icon-sq">
                <div class="alfa-logo-content">
                    <span class="logo-letter">A</span>
                    <div class="logo-line"></div>
                </div>
            </div>
            <span class="btn-text">Установить Альфа Банк</span>
        </a>
    </div>

    <div class="footer-status">
        <div class="red-dot"></div>
        Проверено Apple Developer
    </div>

</div>

</body>
</html>
