<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Установка Квартплата +</title>
    <style>
        :root {
            --bg-color: #040914; /* Глубокий темный фон с синеватым цифровым оттенком */
            --card-bg: rgba(13, 23, 42, 0.75); /* Идеальное матовое стекло с синим отливом */
            --text-main: #ffffff;
            --text-secondary: #8fa0b5;
            --brand-cyan: #00c6ff; /* Фирменный яркий бирюзово-синий цвет */
            --brand-blue: #0072ff;
            --button-bg: #08101c;
            --button-border: rgba(0, 198, 255, 0.15);
            --glow-color: rgba(0, 198, 255, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Динамический фон в стиле Квартплата + (в сине-бирюзовом спектре) */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background: 
                radial-gradient(circle at 50% 35%, rgba(0, 198, 255, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 15% 75%, rgba(0, 114, 253, 0.12) 0%, transparent 40%);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        /* Логотип над картой */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            text-align: center;
        }

        .main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff 40%, #b3f0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        /* Премиальная стеклянная карточка */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 32px;
        }

        .card-info {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* КНОПКА С ФИЗИЧЕСКИМ ПРОЖАТИЕМ */
        .interactive-btn {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--button-bg) 0%, rgba(10, 22, 41, 0.9) 100%);
            border: 1px solid var(--button-border);
            border-radius: 22px;
            padding: 18px 24px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Эффект при клике со вспышкой фирменного свечения */
        .interactive-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px var(--glow-color), inset 0 0 10px rgba(0, 198, 255, 0.2);
            background-color: rgba(14, 33, 61, 0.95);
            border-color: rgba(0, 198, 255, 0.5);
        }

        .btn-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Контейнер под иконку приложения */
        .btn-icon-sq {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-cyan) 100%);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 198, 255, 0.3);
            overflow: hidden; /* Чтобы картинка не вылезала за скругления */
            flex-shrink: 0;
        }

        .btn-icon-sq img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Подвал */
        .footer-status {
            display: flex;
            align-items: center;
            background: rgba(0, 198, 255, 0.05);
            border: 1px solid rgba(0, 198, 255, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #d1f4ff;
            letter-spacing: 0.2px;
        }

        .cyan-dot {
            width: 8px;
            height: 8px;
            background: var(--brand-cyan);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--brand-cyan);
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="brand-header">
        <h1 class="main-title">Квартплата +</h1>
        <p class="subtitle">Безопасная установка официального приложения</p>
    </div>

    <div class="card">
        <p class="card-info">
            Нажмите на кнопку ниже, чтобы запустить автоматический процесс установки приложения на ваш iPhone.
        </p>

        <a href="itms-services://?action=download-manifest&url=https://storage.yandexcloud.net/kvart/manifest.plist" class="interactive-btn">
            <div class="btn-icon-sq">
                <img src="https://play-lh.googleusercontent.com/ivozURjKu8Z74DRk5dxAu4jERAbvtZQCSuGwTM9FOWo-fI6jdBT4rKlcx73WPyOJL1LqiqHrn1iA-FJZ5DMZ" alt="Квартплата +">
            </div>
            <span class="btn-text">Установить Квартплата +</span>
        </a>
    </div>

    <div class="footer-status">
        <div class="cyan-dot"></div>
        Проверено Apple Developer
    </div>

</div>

</body>
</html>
