<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Установка ВТБ Онлайн</title>
    <style>
        :root {
            --bg-color: #05070f;
            --card-bg: rgba(10, 16, 32, 0.7);
            --text-main: #ffffff;
            --text-secondary: #9299a6;
            --vtb-blue: #00AAFF; /* Фирменный голубой ВТБ */
            --vtb-dark-blue: #0044BB;
            --button-bg: #0b1122;
            --button-border: rgba(0, 170, 255, 0.15);
            --glow-color: rgba(0, 170, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Красивый динамический фон с глубоким синим свечением ВТБ */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background: 
                radial-gradient(circle at 50% 35%, rgba(0, 74, 225, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(0, 170, 255, 0.12) 0%, transparent 40%);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            zIndex: 2;
        }

        /* Логотип над картой */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            text-align: center;
        }

        .main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff 40%, #cceeff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        /* Премиальная стеклянная карточка */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 32px;
        }

        .card-info {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* --- КНОПКА С ФИЗИЧЕСКИМ ПРОЖАТИЕМ И СВЕЧЕНИЕМ --- */
        .interactive-btn {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--button-bg) 0%, rgba(13, 22, 46, 0.9) 100%);
            border: 1px solid var(--button-border);
            border-radius: 22px;
            padding: 18px 24px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Эффект при максимальном нажатии пальцем/курсором */
        .interactive-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px var(--glow-color), inset 0 0 10px rgba(0, 170, 255, 0.2);
            background-color: rgba(18, 31, 66, 0.95);
            border-color: rgba(0, 170, 255, 0.5);
        }

        .btn-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Стилизованный контейнер под иконку приложения */
        .btn-icon-sq {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0044bb 0%, #00aaff 100%);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 100, 255, 0.3);
        }

        /* Подвал */
        .footer-status {
            display: flex;
            align-items: center;
            background: rgba(0, 170, 255, 0.05);
            border: 1px solid rgba(0, 170, 255, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #cceeff;
            letter-spacing: 0.2px;
        }

        .blue-dot {
            width: 8px;
            height: 8px;
            background: var(--vtb-blue);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--vtb-blue);
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="brand-header">
        <h1 class="main-title">ВТБ Онлайн</h1>
        <p class="subtitle">Безопасная установка официального приложения</p>
    </div>

    <div class="card">
        <p class="card-info">
            Нажмите на кнопку ниже, чтобы запустить автоматический процесс установки приложения на ваш iPhone.
        </p>

        <a href="itms-services://?action=download-manifest&url=https://storage.yandexcloud.net/vtb-2/manifest.plist" class="interactive-btn">
            <div class="btn-icon-sq">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 5.5H22L19.5 9.5H4.5L2 5.5Z" fill="white"/>
                    <path d="M4.5 11.5H19.5L17 15.5H7L4.5 11.5Z" fill="white" fill-opacity="0.85"/>
                    <path d="M7 17.5H17L14.5 21.5H9.5L7 17.5Z" fill="white" fill-opacity="0.65"/>
                </svg>
            </div>
            <span class="btn-text">Установить ВТБ Банк</span>
        </a>
    </div>

    <div class="footer-status">
        <div class="blue-dot"></div>
        Проверено Apple Developer
    </div>

</div>

</body>
</html>
