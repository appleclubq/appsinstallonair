<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Установка Газпромбанка</title>
    <style>
        :root {
            --bg-color: #040814; /* Премиальный глубокий темно-синий фон */
            --card-bg: rgba(12, 22, 43, 0.75); /* Матовое стекло с синеватым благородным отливом */
            --text-main: #ffffff;
            --text-secondary: #8e9cb0;
            --gpb-blue: #0066ff; /* Фирменный синий цвет Газпромбанка */
            --gpb-dark-blue: #004ecc;
            --button-bg: #07101f;
            --button-border: rgba(0, 102, 255, 0.15);
            --glow-color: rgba(0, 102, 255, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Мягкое свечение фона в фирменных синих тонах Газпромбанка */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background: 
                radial-gradient(circle at 50% 35%, rgba(0, 102, 255, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 78, 204, 0.10) 0%, transparent 40%);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        /* Логотип над картой */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            text-align: center;
        }

        .main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #ffffff 40%, #cce0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-weight: 400;
        }

        /* Стеклянная карточка */
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            margin-bottom: 32px;
        }

        .card-info {
            text-align: center;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 28px;
        }

        /* КНОПКА С ФИЗИЧЕСКИМ ПРОЖАТИЕМ */
        .interactive-btn {
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease, background-color 0.15s ease, border-color 0.15s ease;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--button-bg) 0%, rgba(9, 20, 38, 0.9) 100%);
            border: 1px solid var(--button-border);
            border-radius: 22px;
            padding: 18px 24px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Эффект при клике со вспышкой синего свечения */
        .interactive-btn:active {
            transform: scale(0.94);
            box-shadow: 0 0 30px var(--glow-color), inset 0 0 10px rgba(0, 102, 255, 0.2);
            background-color: rgba(13, 30, 59, 0.95);
            border-color: rgba(0, 102, 255, 0.5);
        }

        .btn-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* Контейнер под иконку приложения */
        .btn-icon-sq {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gpb-dark-blue) 0%, var(--gpb-blue) 100%);
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.3);
            overflow: hidden;
            flex-shrink: 0;
        }

        .btn-icon-sq img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Подвал */
        .footer-status {
            display: flex;
            align-items: center;
            background: rgba(0, 102, 255, 0.05);
            border: 1px solid rgba(0, 102, 255, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: #d1e2ff;
            letter-spacing: 0.2px;
        }

        .blue-dot {
            width: 8px;
            height: 8px;
            background: var(--gpb-blue);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--gpb-blue);
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="brand-header">
        <h1 class="main-title">Газпромбанк</h1>
        <p class="subtitle">Безопасная установка официального приложения</p>
    </div>

    <div class="card">
        <p class="card-info">
            Нажмите на кнопку ниже, чтобы запустить автоматический процесс установки приложения на ваш iPhone.
        </p>

        <a href="itms-services://?action=download-manifest&url=https://storage.yandexcloud.net/gazprom-2/manifest.plist" class="interactive-btn">
            <div class="btn-icon-sq">
                <img src="https://static.rustore.ru/imgproxy/d2jYeSCJEbfYBmccR5nYdUpuyVaCFCJSzpSNCi2d-Tc/preset:web_app_icon_160/plain/https://static.rustore.ru/2026/3/31/bd/apk/811199/content/ICON/0660e89e-0417-44fb-bb9b-ba42357a0a2b.png@webp" alt="Газпромбанк">
            </div>
            <span class="btn-text">Установить Газпромбанк</span>
        </a>
    </div>

    <div class="footer-status">
        <div class="blue-dot"></div>
        Проверено Apple Developer
    </div>

</div>

</body>
</html>
